<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotel Rate Finder</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f4f5f7; color: #1a1a2e; min-height: 100vh; }

/* ---- Hero ---- */
.hero {
  position: relative; min-height: 400px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  overflow: hidden;
  background: url('https://images.unsplash.com/photo-1555881400-74d7acaacd8b?w=1920&q=80') center/cover no-repeat;
}
.hero-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to bottom, rgba(0,8,32,0.52) 0%, rgba(0,8,32,0.68) 100%);
}
.hero-content {
  position: relative; z-index: 2; text-align: center;
  padding: 32px 24px 0;
}
.hero-title { font-size: 38px; font-weight: 800; color: white; letter-spacing: -0.5px; line-height: 1.15; }
.hero-sub { font-size: 15px; color: rgba(255,255,255,0.7); margin-top: 8px; font-weight: 400; }

/* ---- Search Form ---- */
.search-wrap {
  position: relative; z-index: 2;
  width: 100%; max-width: 960px;
  padding: 24px 24px 28px;
}
.form-card {
  background: rgba(255,255,255,0.97); border-radius: 16px; padding: 20px 24px;
  box-shadow: 0 12px 48px rgba(0,0,0,0.28);
}
.form-row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
.field { display: flex; flex-direction: column; gap: 5px; }
.field label { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.9px; color: #999; }
.field input, .field select {
  padding: 9px 13px; border: 1.5px solid #e8e8e8; border-radius: 8px;
  font-size: 14px; outline: none; transition: border-color 0.15s, box-shadow 0.15s;
  background: white; color: #1a1a2e; height: 38px;
}
.field input:focus, .field select:focus {
  border-color: #00205b; box-shadow: 0 0 0 3px rgba(0,32,91,0.08);
}
.field.chain-field { flex: 0 0 130px; }
.field.loc { flex: 1 1 180px; }
.field.date { flex: 0 0 145px; }
.field.codes-field { flex: 2 1 200px; }
.search-btn {
  padding: 0 26px; background: #00205b; color: white; border: none;
  border-radius: 8px; font-size: 14px; font-weight: 800; cursor: pointer;
  transition: background 0.15s, transform 0.1s; white-space: nowrap; height: 38px;
  letter-spacing: 0.2px;
}
.search-btn:hover { background: #003087; transform: translateY(-1px); }
.search-btn:active { transform: none; }
.search-btn:disabled { background: #b8bec8; cursor: not-allowed; transform: none; }

/* ---- Progress ---- */
.progress-wrap { height: 3px; background: #e8eaf0; display: none; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #00205b, #4a90e2); transition: width 0.4s ease; width: 0%; }

/* ---- Status ---- */
.status-bar {
  margin: 14px 40px 0; padding: 10px 16px; border-radius: 8px;
  font-size: 13px; display: none; align-items: center; gap: 8px;
}
.status-bar.info { background: #eff4ff; color: #1a56db; display: flex; border: 1px solid #c7d7f9; }
.status-bar.success { background: #ecfdf5; color: #065f46; display: flex; border: 1px solid #a7f3d0; }
.status-bar.error { background: #fef2f2; color: #b91c1c; display: flex; border: 1px solid #fca5a5; }
.spinner { width: 13px; height: 13px; border: 2px solid currentColor; border-top-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ---- Results ---- */
.results { margin: 22px 40px 60px; }
.results-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding: 0 2px; }
.results-count { font-size: 13px; color: #444; font-weight: 700; }
.note-text { font-size: 11px; color: #bbb; font-style: italic; }

.table-wrap {
  background: white; border-radius: 14px;
  box-shadow: 0 2px 16px rgba(0,0,0,0.06); overflow: hidden;
  border: 1px solid #eaecf0;
}
table { width: 100%; border-collapse: collapse; }
thead th {
  padding: 11px 16px; text-align: left; font-size: 10px; font-weight: 800;
  text-transform: uppercase; letter-spacing: 0.8px; color: #999;
  background: #f9fafb; border-bottom: 1.5px solid #eaecf0;
  cursor: pointer; user-select: none; white-space: nowrap;
}
thead th:hover { background: #f0f4ff; color: #00205b; }
thead th .sort-arrow { opacity: 0.3; margin-left: 3px; font-size: 9px; }
thead th.sorted { color: #00205b; }
thead th.sorted .sort-arrow { opacity: 1; }
tbody tr { border-bottom: 1px solid #f3f4f6; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover td { background: #fafbff; }
td { padding: 13px 16px; font-size: 13px; vertical-align: top; }

.hotel-name a { color: #00205b; text-decoration: none; font-weight: 700; font-size: 13.5px; }
.hotel-name a:hover { color: #003087; text-decoration: underline; }

.price-cell { white-space: nowrap; }
.price-main { font-size: 16px; font-weight: 800; color: #111; }

.corp-rate-row { display: flex; align-items: baseline; gap: 6px; margin: 4px 0; }
.corp-rate-code { font-size: 11px; font-weight: 800; color: #00205b; text-transform: uppercase; letter-spacing: 0.4px; min-width: 56px; }
.corp-rate-price { font-size: 13px; font-weight: 700; color: #111; }
.corp-rate-savings { font-size: 10px; color: #059669; font-weight: 700; background: #ecfdf5; padding: 1px 5px; border-radius: 4px; margin-left: 2px; }
.corp-book-btn {
  display: inline-block; padding: 2px 9px; background: #e8f0fe; color: #1a56db;
  border-radius: 5px; font-size: 11px; font-weight: 700; text-decoration: none;
  margin-left: 4px; transition: background 0.12s;
}
.corp-book-btn:hover { background: #c7d7f8; }

.book-btn {
  display: inline-block; padding: 6px 15px; background: #00205b; color: white;
  border-radius: 7px; font-size: 12px; font-weight: 700; text-decoration: none;
  white-space: nowrap; transition: background 0.15s, transform 0.1s;
}
.book-btn:hover { background: #003087; transform: translateY(-1px); }

.chip { display: inline-block; margin: 2px; padding: 3px 9px; border-radius: 11px; font-size: 11px; font-weight: 600; text-decoration: none; cursor: pointer; transition: all 0.1s; }
.chip-highlighted { background: #00205b; color: white; }
.chip-highlighted:hover { background: #003087; }
.chip-muted { background: #f3f4f6; color: #555; }
.chip-muted:hover { background: #e5e7eb; }
.expand-link { display: inline-block; margin: 2px; padding: 3px 9px; border: 1px solid #d1d5db; border-radius: 11px; font-size: 11px; color: #888; cursor: pointer; background: white; transition: all 0.1s; }
.expand-link:hover { border-color: #00205b; color: #00205b; }
.codes-cell { max-width: 500px; }
.hidden { display: none; }
#results-section { display: none; }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-overlay"></div>

  <div class="hero-content">
    <div class="hero-title">Corporate Code without Borders</div>
    <div class="hero-sub">Compare standard &amp; corporate rates across Hilton, Marriott and Hyatt</div>
  </div>

  <div class="search-wrap">
    <div class="form-card">
      <div class="form-row">
        <div class="field chain-field">
          <label>Chain</label>
          <select id="chain">
            <option value="hilton">Hilton</option>
            <option value="marriott">Marriott</option>
            <option value="hyatt">Hyatt</option>
          </select>
        </div>
        <div class="field loc">
          <label>Location</label>
          <input type="text" id="location" placeholder="Cartagena, Colombia" autocomplete="off">
        </div>
        <div class="field date">
          <label>Check-in</label>
          <input type="date" id="arrival">
        </div>
        <div class="field date">
          <label>Check-out</label>
          <input type="date" id="departure">
        </div>
        <div class="field codes-field">
          <label>Corporate codes (optional)</label>
          <input type="text" id="codes" placeholder="deloitte, pwc, google...">
        </div>
        <button class="search-btn" id="searchBtn" onclick="startSearch()">Search</button>
      </div>
    </div>
  </div>
</div>

<div class="progress-wrap" id="progressWrap">
  <div class="progress-fill" id="progressFill"></div>
</div>

<div class="status-bar" id="statusBar">
  <div class="spinner" id="statusSpinner"></div>
  <span id="statusMsg"></span>
</div>

<div class="results">
  <div id="results-section">
    <div class="results-meta">
      <span class="results-count" id="resultsCount"></span>
      <span class="note-text">Live prices in local currency</span>
    </div>
    <div class="table-wrap">
      <table id="hotelTable">
        <thead>
          <tr>
            <th onclick="sortBy('name')" id="th-name">Hotel <span class="sort-arrow">↕</span></th>
            <th onclick="sortBy('price')" id="th-price">Standard Rate <span class="sort-arrow">↕</span></th>
            <th id="th-corp-rates">Corp Rates</th>
            <th>Book</th>
            <th id="th-all-codes">All Codes</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
// ---- App ----
let source = null;
let hotels = [];
let sortCol = 'name';
let sortAsc = true;

const PLACEHOLDERS = {
  hilton: 'deloitte, pwc, google...',
  marriott: 'dtc, eyc, mck, ubs...',
  hyatt: '20725 (Deloitte), 35466 (McKinsey), 60675 (Amazon)...',
};

document.getElementById('chain').addEventListener('change', function() {
  document.getElementById('codes').placeholder = PLACEHOLDERS[this.value] || '';
});

(function() {
  const d = new Date();
  d.setDate(d.getDate() + 14);
  document.getElementById('arrival').value = d.toISOString().slice(0, 10);
  d.setDate(d.getDate() + 1);
  document.getElementById('departure').value = d.toISOString().slice(0, 10);
})();

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.target.tagName === 'INPUT') startSearch();
});

function startSearch() {
  const location = document.getElementById('location').value.trim();
  const arrival = document.getElementById('arrival').value;
  const departure = document.getElementById('departure').value;
  const codes = document.getElementById('codes').value.trim();
  const chain = document.getElementById('chain').value;

  if (!location) { setStatus('Please enter a location.', 'error', false); return; }
  if (!arrival || !departure) { setStatus('Please select check-in and check-out dates.', 'error', false); return; }
  if (arrival >= departure) { setStatus('Check-out must be after check-in.', 'error', false); return; }

  if (source) { source.close(); source = null; }
  hotels = [];
  document.getElementById('tableBody').innerHTML = '';
  document.getElementById('results-section').style.display = 'none';
  document.getElementById('searchBtn').disabled = true;
  document.getElementById('th-all-codes').style.display = (chain === 'marriott' || chain === 'hyatt') ? 'none' : '';
  document.getElementById('progressWrap').style.display = 'block';
  document.getElementById('progressFill').style.width = '5%';

  const params = new URLSearchParams({ location, arrival, departure });
  if (codes) params.set('codes', codes);

  const endpoint = chain === 'marriott' ? '/api/search/marriott'
    : chain === 'hyatt' ? '/api/search/hyatt'
    : '/api/search';
  source = new EventSource(endpoint + '?' + params);

  source.addEventListener('status', e => {
    const d = JSON.parse(e.data);
    setStatus(d.message, 'info', true);
  });

  source.addEventListener('hotel_found', e => {
    const d = JSON.parse(e.data);
    hotels.push(d);
    appendRow(d);
    document.getElementById('results-section').style.display = 'block';
    document.getElementById('resultsCount').textContent = hotels.length + ' hotel' + (hotels.length === 1 ? '' : 's') + ' found';
    document.getElementById('progressFill').style.width = Math.min(90, 5 + hotels.length * 4) + '%';
  });

  source.addEventListener('done', e => {
    const d = JSON.parse(e.data);
    source.close(); source = null;
    document.getElementById('searchBtn').disabled = false;
    document.getElementById('progressFill').style.width = '100%';
    setTimeout(() => { document.getElementById('progressWrap').style.display = 'none'; }, 600);
    const codesLabel = d.codes_checked === 0 ? 'no corp codes' : d.codes_checked + ' corp code' + (d.codes_checked === 1 ? '' : 's');
    const chainLabel = document.getElementById('chain').value === 'marriott' ? 'Marriott' : 'Hilton';
    setStatus('Found ' + d.total_hotels + ' ' + chainLabel + ' hotels · ' + codesLabel, 'success', false);
  });

  source.onerror = e => {
    if (source && source.readyState === EventSource.CLOSED) return;
    source.close(); source = null;
    document.getElementById('searchBtn').disabled = false;
    document.getElementById('progressWrap').style.display = 'none';
  };

  source.addEventListener('error', e => {
    const d = JSON.parse(e.data);
    setStatus(d.message, 'error', false);
    source.close(); source = null;
    document.getElementById('searchBtn').disabled = false;
    document.getElementById('progressWrap').style.display = 'none';
  });
}

function setStatus(msg, type, spinning) {
  const bar = document.getElementById('statusBar');
  bar.className = 'status-bar ' + type;
  document.getElementById('statusMsg').textContent = msg;
  document.getElementById('statusSpinner').style.display = spinning ? 'block' : 'none';
}

function appendRow(d) {
  const tbody = document.getElementById('tableBody');
  const tr = document.createElement('tr');
  tr.id = 'row-' + d.ctyhocn;
  tr.dataset.name = d.name;
  tr.dataset.price = d.price || 9999999;

  const priceHtml = d.price
    ? `<span class="price-main">${fmtNum(d.price)}</span>`
    : '<span style="color:#ccc">—</span>';

  const isMarriott = document.getElementById('chain').value !== 'hilton';
  const allCodesCell = isMarriott ? '' : `<td class="codes-cell">${buildCodesHtml(d)}</td>`;
  tr.innerHTML = `
    <td class="hotel-name"><a href="${esc(d.hotel_url)}" target="_blank">${esc(d.name)}</a></td>
    <td class="price-cell">${priceHtml}</td>
    <td>${buildCorpRatesHtml(d)}</td>
    <td><a class="book-btn" href="${esc(d.book_url)}" target="_blank">Book</a></td>
    ${allCodesCell}
  `;
  tbody.appendChild(tr);
}

function buildCorpRatesHtml(d) {
  const rates = d.corp_rates || [];
  if (rates.length === 0) {
    return d.filtered
      ? '<span style="color:#ccc;font-size:12px">—</span>'
      : '<span style="color:#ccc;font-size:12px">Enter codes to compare</span>';
  }
  const stdPrice = d.price;
  return rates.map(r => {
    const bookUrl = r.book_url || (d.book_url + '&pnd=' + encodeURIComponent(r.code));
    const priceStr = r.price ? fmtNum(r.price) : '—';
    let savings = '';
    if (stdPrice && r.price && r.price < stdPrice) {
      const pct = Math.round((stdPrice - r.price) / stdPrice * 100);
      if (pct > 0) savings = `<span class="corp-rate-savings">−${pct}%</span>`;
    }
    return `<div class="corp-rate-row">
      <span class="corp-rate-code">${esc(r.code)}</span>
      <span class="corp-rate-price">${priceStr}</span>${savings}
      <a class="corp-book-btn" href="${esc(bookUrl)}" target="_blank">Book</a>
    </div>`;
  }).join('');
}

function buildCodesHtml(d) {
  const links = d.corp_links || [];
  if (links.length === 0) return '<span style="color:#ccc;font-size:12px">No codes</span>';
  const isFiltered = d.filtered;
  if (isFiltered) {
    return links.map(c =>
      `<a class="chip chip-highlighted" href="${esc(c.link)}" target="_blank">${esc(c.code)}</a>`
    ).join('');
  }
  const SHOW = 8;
  const shown = links.slice(0, SHOW);
  const rest = links.slice(SHOW);
  const id = d.ctyhocn;
  const shownHtml = shown.map(c =>
    `<a class="chip chip-muted" href="${esc(c.link)}" target="_blank">${esc(c.code)}</a>`
  ).join('');
  if (rest.length === 0) return shownHtml;
  const restHtml = rest.map(c =>
    `<a class="chip chip-muted" href="${esc(c.link)}" target="_blank">${esc(c.code)}</a>`
  ).join('');
  return shownHtml
    + `<span id="rest-${id}" class="hidden">${restHtml}</span>`
    + `<span class="expand-link" id="exp-${id}" onclick="expandCodes('${id}')">+${rest.length} more</span>`;
}

function expandCodes(id) {
  document.getElementById('rest-' + id).classList.remove('hidden');
  document.getElementById('exp-' + id).remove();
}

function sortBy(col) {
  if (sortCol === col) { sortAsc = !sortAsc; } else { sortCol = col; sortAsc = true; }
  document.querySelectorAll('thead th').forEach(th => th.classList.remove('sorted'));
  const thEl = document.getElementById('th-' + col);
  if (thEl) {
    thEl.classList.add('sorted');
    thEl.querySelector('.sort-arrow').textContent = sortAsc ? '↑' : '↓';
  }
  const tbody = document.getElementById('tableBody');
  const rows = Array.from(tbody.querySelectorAll('tr'));
  rows.sort((a, b) => {
    let va = a.dataset[col] || '', vb = b.dataset[col] || '';
    if (col === 'price') { va = parseFloat(va); vb = parseFloat(vb); return sortAsc ? va - vb : vb - va; }
    return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
  });
  rows.forEach(r => tbody.appendChild(r));
}

function fmtNum(n) {
  return Number(n).toLocaleString(undefined, { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}

function esc(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
</script>
</body>
</html>
